app = "marra-tracker"
primary_region = "ams"

[env]
  PORT = "8080"
  DATA_DIR = "/data"

[[mounts]]
  source = "marra_data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = false
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
