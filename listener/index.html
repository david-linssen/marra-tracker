<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MARRA — live positie</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
  <style>
    :root { --card: rgba(255,255,255,.94); --ink:#0b2238; --muted:#5a6b7b; --accent:#0a6ebd; }
    * { box-sizing: border-box; }
    html, body { margin:0; height:100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color:var(--ink); }
    #map { position:absolute; inset:0; background:#aadaff; }
    #panel {
      position:absolute; z-index:1000; top:12px; left:12px; width:280px; max-width:calc(100% - 24px);
      background:var(--card); backdrop-filter: blur(6px); border-radius:14px;
      box-shadow:0 6px 24px rgba(0,0,0,.18); padding:14px 16px; line-height:1.35;
    }
    #panel h1 { margin:0 0 2px; font-size:20px; letter-spacing:.5px; }
    #panel .sub { color:var(--muted); font-size:12px; margin-bottom:10px; }
    .status { display:inline-flex; align-items:center; gap:6px; font-weight:600; font-size:13px; }
    .dot { width:9px; height:9px; border-radius:50%; background:#9aa7b2; box-shadow:0 0 0 3px rgba(0,0,0,.04); }
    .dot.moving { background:#1faa52; } .dot.anchor { background:#e0a106; } .dot.moored { background:#c64242; }
    dl { display:grid; grid-template-columns:auto 1fr; gap:4px 10px; margin:10px 0 0; font-size:13px; }
    dl dt { color:var(--muted); } dl dd { margin:0; text-align:right; font-variant-numeric:tabular-nums; }
    #panel .foot { margin-top:10px; font-size:11px; color:var(--muted); }
    #panel .foot a { color:var(--muted); }
    .boat { font-size:26px; line-height:1; filter: drop-shadow(0 1px 2px rgba(0,0,0,.4)); transform-origin:center; }
    .empty { color:var(--muted); font-size:13px; margin-top:6px; }
    @media (max-width:520px) {
      #panel { top:auto; bottom:12px; left:12px; right:12px; width:auto; }
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="panel">
    <h1>⛵ MARRA</h1>
    <div class="sub" id="vessel-sub">MMSI 244038459 · PI8022</div>
    <div class="status"><span class="dot" id="status-dot"></span><span id="status-text">Verbinden…</span></div>
    <dl id="facts"></dl>
    <div class="empty" id="empty" hidden>Nog geen positie ontvangen — wachten op het eerste AIS-signaal.</div>
    <div class="foot">Laatste verversing: <span id="checked">—</span> · AIS via <a href="https://aisstream.io" target="_blank" rel="noopener">aisstream.io</a></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script>
    const TRACK_URL = "track.json";
    const REFRESH_MS = 5 * 60 * 1000;

    const map = L.map("map", { zoomControl: true }).setView([52.9, 5.1], 7);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18, attribution: "&copy; OpenStreetMap"
    }).addTo(map);

    let routeLine = null, dots = null, boat = null, firstFit = true;

    const NAV = {
      0:"Onderweg (motor)", 1:"Voor anker", 2:"Niet manoeuvreerbaar", 3:"Beperkt manoeuvreerbaar",
      4:"Beperkt door diepgang", 5:"Afgemeerd", 6:"Aan de grond", 7:"Vissend",
      8:"Onderweg (zeilend)", 11:"Gesleept", 12:"Sleept", 15:"—"
    };
    function statusClass(s){ if(s===1) return "anchor"; if(s===5||s===6) return "moored"; if(s===0||s===8||s===7) return "moving"; return ""; }
    function statusInfo(p){
      let s=p.nav_status;
      if(s==null || s===15){ // Class B carries no nav status -> infer from speed
        if(p.sog!=null && p.sog>=0.5) return {text:"Onderweg", cls:"moving"};
        return {text:"Stilliggend", cls:""};
      }
      return {text: NAV[s] ?? "Onbekend", cls: statusClass(s)};
    }

    function toRad(d){ return d*Math.PI/180; }
    function haversineNm(a,b){
      const R=3440.065; // nautical miles
      const dLat=toRad(b.lat-a.lat), dLon=toRad(b.lon-a.lon);
      const s=Math.sin(dLat/2)**2 + Math.cos(toRad(a.lat))*Math.cos(toRad(b.lat))*Math.sin(dLon/2)**2;
      return 2*R*Math.asin(Math.sqrt(s));
    }
    function ago(iso){
      if(!iso) return "—";
      const secs=Math.max(0,(Date.now()-new Date(iso).getTime())/1000);
      if(secs<90) return "zojuist";
      if(secs<3600) return Math.round(secs/60)+" min geleden";
      if(secs<86400){ const h=Math.floor(secs/3600); return h+" uur"+(h>1?"":"")+" geleden"; }
      const d=Math.floor(secs/86400); return d+" dag"+(d>1?"en":"")+" geleden";
    }
    function fmtLatLon(lat,lon){
      const ns=lat>=0?"N":"Z", ew=lon>=0?"O":"W";
      return Math.abs(lat).toFixed(4)+"° "+ns+", "+Math.abs(lon).toFixed(4)+"° "+ew;
    }

    function render(track){
      document.getElementById("checked").textContent =
        new Date().toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"});

      const facts = document.getElementById("facts");
      const empty = document.getElementById("empty");

      if(!Array.isArray(track) || track.length===0){
        empty.hidden=false; facts.innerHTML="";
        document.getElementById("status-text").textContent="Wachten op signaal";
        document.getElementById("status-dot").className="dot";
        return;
      }
      empty.hidden=true;

      const pts = track.filter(p => typeof p.lat==="number" && typeof p.lon==="number");
      const latlngs = pts.map(p => [p.lat, p.lon]);
      const last = pts[pts.length-1];

      let dist=0;
      for(let i=1;i<pts.length;i++) dist += haversineNm(pts[i-1], pts[i]);

      if(routeLine) routeLine.remove();
      routeLine = L.polyline(latlngs, {color:"#0a6ebd", weight:3, opacity:.85}).addTo(map);

      if(dots) dots.remove();
      dots = L.layerGroup(pts.slice(0,-1).map(p =>
        L.circleMarker([p.lat,p.lon], {radius:3, color:"#0a6ebd", weight:1, fillOpacity:.6})
      )).addTo(map);

      const rot = (last.heading!=null ? last.heading : (last.cog!=null ? last.cog : 0));
      const icon = L.divIcon({ className:"", iconSize:[30,30], iconAnchor:[15,15],
        html:`<div class="boat" style="transform:rotate(${rot}deg)">⛵</div>` });
      if(boat) boat.remove();
      boat = L.marker([last.lat,last.lon], {icon}).addTo(map);
      boat.bindPopup(
        `<b>MARRA</b><br>${fmtLatLon(last.lat,last.lon)}<br>` +
        `${statusInfo(last).text}<br>` +
        (last.sog!=null ? `${last.sog.toFixed(1)} kn` : "—") +
        (last.cog!=null ? ` · koers ${Math.round(last.cog)}°` : "") +
        `<br><small>${ago(last.time)}</small>`
      );

      const si = statusInfo(last);
      document.getElementById("status-text").textContent = si.text;
      document.getElementById("status-dot").className = "dot " + si.cls;

      facts.innerHTML = `
        <dt>Bijgewerkt</dt><dd title="${last.time}">${ago(last.time)}</dd>
        <dt>Positie</dt><dd>${fmtLatLon(last.lat,last.lon)}</dd>
        <dt>Snelheid</dt><dd>${last.sog!=null ? last.sog.toFixed(1)+" kn" : "—"}</dd>
        <dt>Koers</dt><dd>${last.cog!=null ? Math.round(last.cog)+"°" : "—"}</dd>
        ${last.destination ? `<dt>Bestemming</dt><dd>${last.destination}</dd>` : ""}
        <dt>Afgelegd</dt><dd>${dist.toFixed(1)} zm</dd>
        <dt>Punten</dt><dd>${pts.length}</dd>`;

      if(firstFit && latlngs.length){
        map.fitBounds(routeLine.getBounds(), {padding:[50,50], maxZoom:13});
        firstFit=false;
      }
    }

    async function refresh(){
      try{
        const res = await fetch(TRACK_URL + "?_=" + Date.now(), {cache:"no-store"});
        render(await res.json());
      }catch(e){
        document.getElementById("status-text").textContent="Kon gegevens niet laden";
      }
    }
    refresh();
    setInterval(refresh, REFRESH_MS);
  </script>
</body>
</html>
